name: Process Add Tool
on:
  issues:
    types: [opened]

jobs:
  reject:
    if: |
      github.event.issue.user.login != 'autowert66' &&
      (contains(github.event.issue.labels.*.name, 'add-tool') || startsWith(github.event.issue.title, 'Add Tool:'))
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '⛔ You are not authorized to add tools. Only the repository owner can use this feature.',
            })

  add-tool:
    if: |
      github.event.issue.user.login == 'autowert66' &&
      (contains(github.event.issue.labels.*.name, 'add-tool') || startsWith(github.event.issue.title, 'Add Tool:'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      actions: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/github-script@v7
        id: parse
        with:
          script: |
            const body = context.payload.issue.body

            function extract(label) {
              const regex = new RegExp(`### ${label}\\s*\\n\\n(.+?)(?=\\n### |$)`, 's')
              const match = body.match(regex)
              return match ? match[1].trim() : ''
            }

            function extractCodeBlock(label) {
              const regex = new RegExp(`### ${label}\\s*\\n\\n\`\`\`(?:vue)?\\s*\\n([\\s\\S]*?)\`\`\``, 'i')
              const match = body.match(regex)
              return match ? match[1].trim() : ''
            }

            let slug = extract('Page Slug')
            const code = extractCodeBlock('Page Code')

            if (!slug || !code) {
              throw new Error('Missing required fields: page_slug and/or page_code')
            }

            slug = slug.replace(/\.vue$/i, '')

            if (!/^[a-z0-9]+(?:-[a-z0-9]+)*$/.test(slug)) {
              throw new Error(`Invalid slug "${slug}". Use kebab-case (lowercase letters, numbers, hyphens).`)
            }

            const fs = require('fs')
            const filePath = `app/pages/tools/${slug}.vue`

            if (fs.existsSync(filePath)) {
              throw new Error(`Tool "${slug}" already exists. Delete it first or use a different slug.`)
            }

            fs.writeFileSync(filePath, code + '\n')

            core.setOutput('slug', slug)

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "app/pages/tools/${{ steps.parse.outputs.slug }}.vue"
          git commit -m "feat: add ${{ steps.parse.outputs.slug }} tool"
          git push

      - uses: actions/github-script@v7
        with:
          script: |
            const slug = '${{ steps.parse.outputs.slug }}'
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `✅ **${slug}** added! Deploying to https://autowert66.github.io/side-quests/tools/${slug}`,
            })
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed',
            })

      - name: Trigger deploy
        run: |
          sleep 15
          gh workflow run deploy.yml --ref main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
